<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCTI — Physical AI Hackathon 2026</title>
  <meta name="description" content="HCTI 黑客松人格测试：48 小时重新定义物理智能，测出你的竞赛人设与组队最佳拍档。">
  <style>
    :root {
      --bg: #020205;
      --bg-surface: #0d1018;
      --bg-elevated: #161b24;
      --border: #1e2733;
      --cyan: #00e5ff;
      --pink: #ff2a6d;
      --purple: #b366ff;
      --amber: #f5a623;
      --green: #05ffa1;
      --silver: #e2e8f0;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-hover: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #eef2f7;
      --text-secondary: #8896a7;
      --glow-cyan: 0 0 20px rgba(0, 229, 255, 0.2), 0 0 60px rgba(0, 229, 255, 0.08);
      --glow-pink: 0 0 20px rgba(255, 42, 109, 0.2);
      --hk-red: #c41e3a;
      --hk-gold: #d4a017;
      --hk-blue: #1b3a5c;
      --hk-green-station: #2d5a3d;
      --hk-purple: #5b2c6e;
      --mtr-tile: rgba(255,255,255,0.03);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow-x: hidden;
      line-height: 1.6;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ---------- Background scene ---------- */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: -2;
      overflow: hidden;
    }
    .bg-scene img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.1s linear;
      --tx: 0px;
      --ty: 0px;
      transform: translate3d(var(--tx), var(--ty), 0) scale(1.05);
    }
    .vignette {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 25%, transparent 0%, rgba(2,2,5,0.55) 55%, rgba(2,2,5,0.92) 100%);
      pointer-events: none;
    }
    .noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }

    /* ---------- Floating orbs ---------- */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.45;
      pointer-events: none;
      z-index: -1;
      mix-blend-mode: screen;
      will-change: transform;
    }
    .orb-1 {
      width: 55vw; height: 55vw;
      background: radial-gradient(circle at 40% 40%, rgba(0,240,255,0.9) 0%, rgba(0,240,255,0) 60%);
      top: -10%; left: -10%;
      animation: drift-1 22s infinite alternate ease-in-out;
    }
    .orb-2 {
      width: 45vw; height: 45vw;
      background: radial-gradient(circle at 50% 50%, rgba(255,42,109,0.85) 0%, rgba(255,42,109,0) 60%);
      bottom: -15%; right: -10%;
      animation: drift-2 26s infinite alternate-reverse ease-in-out;
    }
    .orb-3 {
      width: 32vw; height: 32vw;
      background: radial-gradient(circle at 50% 50%, rgba(168,85,247,0.85) 0%, rgba(168,85,247,0) 60%);
      top: 45%; left: 55%;
      animation: drift-3 18s infinite alternate ease-in-out;
    }
    @keyframes drift-1 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(12vw, 8vh, 0) scale(1.12); }
    }
    @keyframes drift-2 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(-10vw, -10vh, 0) scale(1.18); }
    }
    @keyframes drift-3 {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(-8vw, 6vh, 0) scale(1.1); }
    }

    /* ---------- Intro Overlay ---------- */
    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: #020205;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.4s ease, transform 1.4s ease;
      pointer-events: none;
      animation: intro-auto-exit 0.01s forwards;
      animation-delay: 2.3s;
    }
    @keyframes intro-auto-exit { to { opacity: 0; transform: scale(1.08); visibility: hidden; } }
    .intro-overlay.exiting {
      opacity: 0;
      transform: scale(1.08);
      pointer-events: none;
    }
    .intro-stage {
      text-align: center;
      width: min(420px, 85%);
    }
    .intro-logo {
      display: inline-block;
      padding: 1.2rem 2.4rem;
      border-radius: 1.5rem;
      background: var(--glass);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.15);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 0.05em;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.8);
      margin-bottom: 2.5rem;
      box-shadow: 0 0 40px rgba(0,240,255,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
      animation: logo-breathe 2.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }
    .intro-logo::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      animation: logo-sweep 2.5s linear infinite;
    }
    @keyframes logo-breathe {
      0%, 100% { box-shadow: 0 0 30px rgba(0,240,255,0.08); -webkit-text-stroke-color: rgba(255,255,255,0.5); }
      50% { box-shadow: 0 0 60px rgba(0,240,255,0.25); -webkit-text-stroke-color: var(--cyan); }
    }
    @keyframes logo-sweep { to { left: 150%; } }
    .intro-status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      font-family: 'Space Grotesk', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    .intro-status { color: var(--cyan); }
    .neural-nodes {
      display: flex; align-items: center; justify-content: center;
      gap: 0; margin-bottom: 1.5rem; height: 32px;
    }
    .neural-nodes .node {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.1); flex-shrink: 0;
      position: relative; z-index: 1;
      animation: node-on 0.01s forwards paused;
    }
    .neural-nodes .node.n1 { animation-delay: 0s; animation-play-state: running; }
    .neural-nodes .node.n2 { animation-delay: 0.4s; animation-play-state: running; }
    .neural-nodes .node.n3 { animation-delay: 0.8s; animation-play-state: running; }
    .neural-nodes .node.n4 { animation-delay: 1.2s; animation-play-state: running; }
    .neural-nodes .node.n5 { animation-delay: 1.6s; animation-play-state: running; }
    @keyframes node-on { to { background: #fff; box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,240,255,0.6); } }
    .neural-nodes .node.active { background: #fff; box-shadow: 0 0 12px var(--cyan), 0 0 24px rgba(0,240,255,0.6); }
    .neural-nodes .edge {
      width: 32px; height: 1px;
      background: rgba(255,255,255,0.06); flex-shrink: 0;
      animation: edge-on 0.01s forwards paused;
    }
    .neural-nodes .edge.e1 { animation-delay: 0.4s; animation-play-state: running; }
    .neural-nodes .edge.e2 { animation-delay: 0.8s; animation-play-state: running; }
    .neural-nodes .edge.e3 { animation-delay: 1.2s; animation-play-state: running; }
    .neural-nodes .edge.e4 { animation-delay: 1.6s; animation-play-state: running; }
    @keyframes edge-on { to { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); } }
    .neural-nodes .edge.live { background: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
    .intro-glow-pulse {
      position: absolute;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 200px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.08) 0%, transparent 70%);
      animation: glow-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%,-50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%,-50%) scale(1.3); }
    }
    .intro-terms {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      min-height: 1.2em;
    }
    .intro-scanline {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0;
      box-shadow: 0 0 20px var(--cyan);
      animation: scan-sweep 2s ease-out 0.5s forwards;
    }
    @keyframes scan-sweep {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ---------- Navigation ---------- */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 5vw;
      background: linear-gradient(to bottom, rgba(2,2,5,0.85), transparent 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    nav.visible { opacity: 1; }
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.25rem;
    }
    .nav-links a {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 1px;
      background: var(--cyan);
      transition: width 0.3s;
    }
    .nav-links a:hover { color: var(--cyan); }
    .nav-links a:hover::after { width: 100%; }
    .lang-switch { display: flex; gap: 0.2rem; margin-left: 1rem; }
    .lang-btn { padding: 0.25rem 0.5rem; font-family: 'Space Grotesk', sans-serif; font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.4); background: transparent; border: 1px solid transparent; border-radius: 5px; cursor: pointer; transition: all 0.3s; letter-spacing: 0.05em; }
    .lang-btn:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,255,255,0.2); }
    .lang-btn.active { color: var(--cyan); border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.08); }
    .hero-lang { position: fixed; top: 1.2rem; right: 5vw; z-index: 110; opacity: 0; transition: opacity 0.6s ease; }
    .hero.visible .hero-lang { opacity: 1; }
    .hero-lang .lang-btn { padding: 0.3rem 0.55rem; font-size: 0.72rem; }

    /* ---------- Hero ---------- */
    .hero {
      min-height: 100vh; min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 5vw;
      position: relative;
      opacity: 0;
      transition: opacity 0.6s ease;
      animation: hero-auto-show 0.01s forwards;
      animation-delay: 2.3s;
    }
    @keyframes hero-auto-show { to { opacity: 1; } }
    .hero.visible { opacity: 1; }
    .hero .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0;
      transition: opacity 0.8s ease 0.3s;
    }
    .hero.visible .eyebrow { opacity: 1; }
    .hero .eyebrow::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    .hero h1 { position: relative; }
    .hero h1::before {
      content: 'Physical AI\A Hackathon';
      white-space: pre;
      position: absolute; top: 0; left: 0; z-index: 0;
      width: 100%; height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      font-size: inherit; font-weight: 700;
      line-height: 0.95; letter-spacing: -0.04em;
      -webkit-text-fill-color: transparent;
      pointer-events: none; opacity: 0;
    }
    .hero.visible h1::before { animation: hk-ghost 2s infinite 0.3s; }
    @keyframes hk-ghost {
      0%, 84%, 100% { opacity: 0; transform: translate(0,0); }
      85% { opacity: 0.8; transform: translate(-5px, 1px); -webkit-text-stroke: 2px #ED1C24; }
      86% { opacity: 0.6; transform: translate(5px, -1px); -webkit-text-stroke: 2px #00B2BC; }
      87% { opacity: 0.7; transform: translate(-3px, 0); -webkit-text-stroke: 2px #F7941D; }
      88% { opacity: 0.5; transform: translate(3px, 1px); -webkit-text-stroke: 2px #0066B3; }
      89% { opacity: 0; transform: translate(0,0); }
    }
    .hero h1 { font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2.6rem, 9vw, 6.5rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.04em;
      background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 38%, #ffffff 55%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 60px rgba(0,240,255,0.25), 0 0 120px rgba(168,85,247,0.18);
      margin-bottom: 0.8rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease 0.5s, transform 1s ease 0.5s;
    }

    .hero.visible h1 { opacity: 1; transform: translateY(0); }
    .hero .subtitle {
      font-size: clamp(0.95rem, 2vw, 1.3rem);
      color: rgba(255,255,255,0.55);
      max-width: 640px;
      margin-bottom: 2rem;
      font-weight: 300;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease 0.7s, transform 1s ease 0.7s;
    }
    .hero.visible .subtitle { opacity: 1; transform: translateY(0); }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease 0.9s, transform 1s ease 0.9s;
    }
    .hero.visible .countdown { opacity: 1; transform: translateY(0); }
    .countdown .unit {
      min-width: 64px;
      padding: 0.6rem 0.5rem;
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1rem;
      text-align: center;
      transition: transform 0.3s, border-color 0.3s;
    }
    .countdown .unit:hover {
      transform: translateY(-4px);
      border-color: rgba(0,240,255,0.3);
    }
    .countdown .number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      display: block;
      line-height: 1;
      margin-bottom: 0.2rem;
      background: linear-gradient(180deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .countdown .label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1.05rem 2.8rem;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,255,255,0.14), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 25px rgba(0,240,255,0.15), inset 0 1px 0 rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(20px);
      --cta-transition: opacity 1s ease 1.1s, transform 1s ease 1.1s, box-shadow 0.35s, border-color 0.35s, background 0.35s;
      transition: var(--cta-transition);
    }
    .hero.visible .cta { opacity: 1; transform: translateY(0); }
    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s;
    }
    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 45px rgba(0,240,255,0.35);
      border-color: rgba(0,240,255,0.5);
    }
    .cta:hover::before { transform: translateX(100%); }

    /* ---------- Disclaimer ---------- */
    .disclaimer {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
      max-width: 580px;
      margin: 1.8rem auto 0;
      line-height: 1.5;
      opacity: 0;
      transition: opacity 1s ease 1.3s;
    }
    .hero.visible .disclaimer { opacity: 1; }

    /* ---------- Sections ---------- */
    section {
      padding: 7rem 5vw;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    /* ---------- Quiz Overlay ---------- */
    .quiz-overlay {
      position: fixed;
      inset: 0;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      display: flex;
      flex-direction: column;
      background: rgba(2,2,5,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .quiz-overlay.active {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 5vw;
      gap: 1.5rem;
    }
    .back-btn {
      padding: 0.6rem 1.2rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .back-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .progress-wrap {
      flex: 1;
      max-width: 500px;
      display: flex;
      align-items: center;
      gap: 0;
      position: relative;
    }
    /* MTR route map style: colored line + station dots */
    .mtr-route-line {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      position: relative;
      overflow: visible;
    }
    .mtr-route-fill {
      height: 100%;
      width: 0%;
      border-radius: 3px;
      transition: width 0.5s ease, background 0.4s ease;
      background: var(--cyan);
    }
    .mtr-route-fill.a1 { background: var(--cyan); }
    .mtr-route-fill.a2 { background: #ff6b6b; }
    .mtr-route-fill.a3 { background: var(--purple); }
    .mtr-route-fill.a4 { background: var(--amber); }
    .mtr-route-fill.a5 { background: var(--pink); }
    .mtr-route-dots {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
    }
    .mtr-route-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.15);
      transition: all 0.4s ease;
      flex-shrink: 0;
    }
    .mtr-route-dot.done { background: #fff; border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }
    .mtr-route-dot.current { background: #fff; border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.8); transform: scale(1.4); }
    .progress-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      color: var(--text-secondary);
      min-width: 50px;
      text-align: right;

    .quiz-card {

    /* MTR mosaic tile wall — the iconic HK station look */

    .mtr-tile-wall.a4 { background: var(--amber); }

    .quiz-actions { display: flex; justify-content: space-between; align-items: center; }
    .primary-btn {

  <script>

    // ==================== INTRO ANIMATION ====================

      document.getElementById('hours').textContent = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
      document.getElementById('minutes').textContent = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');

    const hkElements = [

      { name: '西九龍', nameZh: '西九龙', nameEn: 'West Kowloon', line: '屯馬線', lineZh: '屯马线', lineEn: 'Tuen Ma Line', color: '#D9603B' },
      { name: '淺水灣', nameZh: '浅水湾', nameEn: 'Repulse Bay', line: '南港島線', lineZh: '南港岛线', lineEn: 'South Island Line', color: '#00B2BC' },
    ];
    function hkElName(el) {
      if (state.lang === 'en') return el.nameEn;
      if (state.lang === 'zh-HK') return el.name;
      return el.nameZh || el.name;
    }
    function hkElLine(el) {
      if (state.lang === 'en') return el.lineEn;

    function getHKLandmark() { return randHK(); }

    function selectHK(idx) {
      state._hkIdx = idx;

    function showHKPicker() {
      quizOverlay.classList.remove('active');
      document.getElementById('hk-overlay').classList.add('active');
      document.getElementById('hk-picker-title').textContent = __('hkPickerTitle');
      document.getElementById('hk-picker-sub').textContent = __('hkPickerSub');
      renderHKPicker(state._hkIdx !== undefined ? state._hkIdx : -1);
    }
    function updateUILabels() {
      document.getElementById('back-home').textContent = __('backHome');
      document.getElementById('start-btn').textContent = __('startBtn');
      document.getElementById('hero-subtitle').textContent = __('heroSubtitle');
      document.querySelector('.disclaimer').textContent = __('disclaimer');
    }

    function setLang(lang) {
      if (lang === state.lang) return;
      state.lang = lang;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      updateUILabels();
      document.body.classList.add("lang-glitching");
      setTimeout(() => document.body.classList.remove("lang-glitching"), 350);

      const hkActive = document.getElementById('hk-overlay').classList.contains('active');
      const resultActive = getResultOverlay().classList.contains('active');

      if (quizOverlay.classList.contains('active')) {
        questionCard.classList.add('switching');
        setTimeout(() => { renderQuestion(); questionCard.classList.remove('switching'); }, 160);
      }
      if (resultActive) {
        getResultOverlay().style.opacity = '0';
        setTimeout(() => { showResult(); getResultOverlay().style.opacity = '1'; }, 120);
      }
      if (hkActive) {
        document.getElementById('hk-picker-title').textContent = __('hkPickerTitle');
        document.getElementById('hk-picker-sub').textContent = __('hkPickerSub');
        renderHKPicker(state._hkIdx !== undefined ? state._hkIdx : -1);
      }

    }

    // Language switchers (hero + quiz header)
    document.getElementById('lang-switch').addEventListener('click', (e) => {
      if (!e.target.classList.contains('lang-btn')) return;
      setLang(e.target.dataset.lang);
    });
    const heroLang = document.getElementById('hero-lang-switch');
    if (heroLang) {
      heroLang.addEventListener('click', (e) => {
        if (!e.target.classList.contains('lang-btn')) return;
        setLang(e.target.dataset.lang);
      });
    }

    // ==================== SCORING ENGINE ====================
    function computeScores() {
      const raw = { A1: 0, A2: 0, A3: 0, A4: 0, A5: 0 };
      questions.forEach((q, i) => {
        const val = state.answers[i] !== undefined ? state.answers[i] : 1; // A=0→1, B=1→3, C=2→5
        const score = val === 0 ? 1 : val === 1 ? 3 : 5;
        raw[q.ab] += score;
      });
      const normalized = {};
      for (const [k, v] of Object.entries(raw)) {
        normalized[k] = Math.round(((v - 5) / 20) * 100); // range 5-25 → 0-100
      }
      return { raw, normalized };
    }

    function matchPersona(scores) {
      if(state._forcePersona){const fp=personas.find(p=>p.id===state._forcePersona);state._forcePersona=null;return fp;}
      const userVec = ['A1','A2','A3','A4','A5'].map(k => {
        const s = scores.normalized[k];
        return Math.max(1, Math.min(5, Math.round(s / 25) + 1));
      });

      // Check hidden triggers first
      const a5Score = scores.normalized['A5']; // 表达力
      const a4Score = scores.normalized['A4']; // 协作力
      const a2Score = scores.normalized['A2']; // 落地力
      const q21to24C = [21,22,23,24].filter(id => {
        const idx = questions.findIndex(q => q.id === id);
        return state.answers[idx] === 2; // C option
      }).length;

      if (a5Score >= 85 && a4Score >= 75 && q21to24C >= 3 && a2Score >= 55) {
        return personas.find(p => p.id === 'TIN-HAU');
      }

      const allBelow85 = ['A1','A2','A3','A4','A5'].every(k => scores.normalized[k] < 85);
      const q16_19_20_low = [16,19,20].every(id => {
        const idx = questions.findIndex(q => q.id === id);
        return state.answers[idx] !== 0; // not A (not quitter)
      });
      if (allBelow85 && q16_19_20_low) {
        return personas.find(p => p.id === 'MCDULL');
      }

      // Regular matching: Euclidean distance to template vectors
      let best = null;
      let bestDist = Infinity;
      for (const p of regularPersonas) {
        let dist = 0;
        for (let i = 0; i < 5; i++) {
          dist += Math.pow(userVec[i] - p.vector[i], 2);
        }
        dist = Math.sqrt(dist);
        if (dist < bestDist) { bestDist = dist; best = p; }
      }
      return best;
    }

    // ==================== RADAR CHART ====================
    function drawRadar(scores) {
      const canvas = document.getElementById('radar-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2;
      const r = 60;
      const keys = ['A1','A2','A3','A4','A5'];
      const data = keys.map(k => Math.max(5, scores.normalized[k]));

      ctx.clearRect(0, 0, W, H);

      for (let level = 1; level <= 4; level++) {
        ctx.beginPath();
        for (let i = 0; i < 5; i++) {
          const angle = -Math.PI / 2 + (2 * Math.PI * i) / 5;
          const rr = (r / 4) * level;
          const x = cx + rr * Math.cos(angle);
          const y = cy + rr * Math.sin(angle);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / 5;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.stroke();
      }

      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / 5;
        const rr = (data[i] / 100) * r;
        const x = cx + rr * Math.cos(angle);
        const y = cy + rr * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      const grad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy + r);
      grad.addColorStop(0, 'rgba(0, 240, 255, 0.25)');
      grad.addColorStop(1, 'rgba(168, 85, 247, 0.25)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0, 240, 255, 0.6)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      for (let i = 0; i < 5; i++) {
        const angle = -Math.PI / 2 + (2 * Math.PI * i) / 5;
        const rr = (data[i] / 100) * r;
        ctx.beginPath();
        ctx.arc(cx + rr * Math.cos(angle), cy + rr * Math.sin(angle), 3, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
      }

      // center avg
      ctx.fillStyle = '#fff';
      ctx.font = '700 12px "Space Grotesk", sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(Math.round(data.reduce((a, b) => a + b, 0) / 5) + '%', cx, cy + 4);
    }

    // ==================== ABILITY BARS ====================
    function renderAbilityBars(scores) {
      const labels = tArray('abLabels');
      const keys = ['A1','A2','A3','A4','A5'];
      const cls = ['a1','a2','a3','a4','a5'];

      });

    }

    // ==================== TOP3 SIMILAR ====================
    function computeTop3(scores) {
      const userVec = ['A1','A2','A3','A4','A5'].map(k => {
        const s = scores.normalized[k];
        return Math.max(1, Math.min(5, Math.round(s / 25) + 1));
      });
      const ranked = regularPersonas.map(p => {
        let dist = 0;
        for (let i = 0; i < 5; i++) dist += Math.pow(userVec[i] - p.vector[i], 2);
        return { persona: p, dist: Math.sqrt(dist) };
      });
      ranked.sort((a, b) => a.dist - b.dist);
      const maxDist = Math.sqrt(5 * 16);
      return ranked.slice(0, 4).map(r => ({
        persona: r.persona,
        name: r.persona.name,
        pct: Math.round((1 - r.dist / 8.94) * 100)
      }));
    }

      document.getElementById('similar-chips').innerHTML = top3.map(t => {
        const tp = state.lang === 'en' && P_EN[t.persona.id] ? P_EN[t.persona.id].name : t.name;
        return `<div class="similar-chip"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg><span class="sim-name">${tp}</span><span class="sim-pct">${t.pct}%</span></div>`;
      }).join('');

      // Update action buttons
      document.getElementById('restart-btn').textContent = __('restart');
      document.getElementById('share-btn').textContent = __('share');

      showResultOverlay();
      document.getElementById('result-card').scrollTop = 0;
    }

    // ==================== BUTTON HANDLERS ====================
    nextBtn.addEventListener('click', () => {
      clearTimeout(state._autoTimer);
      if (state.current < questions.length - 1) {
        switchToQuestion(state.current + 1);
      } else {
        randHK(); showResult();
      }
    });

    prevBtn.addEventListener('click', () => {
      if (state.current > 0) { clearTimeout(state._autoTimer); switchToQuestion(state.current - 1); }
    });

        document.getElementById('community-btn').addEventListener('click', () => {
      document.getElementById('qr-modal').classList.add('active');
    });

    document.getElementById('back-home').addEventListener('click', hideQuiz);
    document.getElementById('start-btn').addEventListener('click', () => {
      state.current = 0; state.answers = []; initShuffles(); updateUILabels(); showQuiz(); renderQuestion();
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      console.log('RESTART clicked'); state.answers = []; state.current = 0; initShuffles();
      hideQuiz();
    });
    document.getElementById('share-btn').addEventListener('click', () => {
      if (typeof html2canvas !== 'undefined') {
        doShareCapture();
        return;
      }
      document.getElementById('share-loading').style.display = 'flex';
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
      s.onload = () => {
        document.getElementById('share-loading').style.display = 'none';
        doShareCapture();
      };
      s.onerror = () => {
        document.getElementById('share-loading').style.display = 'none';
        alert('分享功能加载失败，请检查网络后重试');
      };
      document.head.appendChild(s);
    });

    function doShare(blob) {
      var file = new File([blob], 'HCTI-result.png', { type: 'image/png' });
      var url = URL.createObjectURL(blob);
      var img = document.getElementById('share-preview-img');
      img.src = url;
      img.onload = function() { URL.revokeObjectURL(url); };
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file] }).then(function() {
          document.getElementById('share-preview-hint').textContent = '分享成功';
          document.getElementById('share-preview-overlay').classList.add('active');
          setTimeout(function() { document.getElementById('share-preview-overlay').classList.remove('active'); }, 1500);
        }).catch(function() { doFallback(url, img); });
      } else { doFallback(url, img); }
    }
    function doFallback(url, img) {
      var a = document.createElement('a');
      a.href = url; a.download = 'HCTI-result.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      img.src = url;
      document.getElementById('share-preview-hint').textContent = '长按图片保存 或截图分享到微信';
      document.getElementById('share-preview-overlay').classList.add('active');
      setTimeout(function() { URL.revokeObjectURL(url); }, 10000);
    }
    
    function doShareCapture() {
      const footer = document.querySelector('.result-footer');
      const card = document.getElementById('result-card');
      const overlay = document.getElementById('result-overlay');
      
      // Save original card dimensions for full capture
      const origMaxH = card.style.maxHeight;
      const origOverflow = card.style.overflow;
      card.style.maxHeight = 'none';
      card.style.overflow = 'visible';
      card.scrollTop = 0;
      
      // Ensure card is visible for capture
      const origFooterDisp = footer.style.display;
      const origCardBg = card.style.background;
      const origOverlayBg = overlay.style.background;
      const origOverlayOpacity = overlay.style.opacity;
      
      footer.style.display = 'none';
      card.style.background = '#0d1018';
      overlay.style.background = '#0d1018';
      overlay.style.opacity = '1';
      
      document.getElementById('share-loading').style.display = 'flex';
      
      setTimeout(() => {
        html2canvas(card, { 
          scale: 2, 
          backgroundColor: '#0d1018',
          logging: false
        }).then(canvas => {
          footer.style.display = origFooterDisp;
          card.style.maxHeight = origMaxH;
          card.style.overflow = origOverflow;
          card.style.background = origCardBg;
          overlay.style.background = origOverlayBg;
          overlay.style.opacity = origOverlayOpacity;
          document.getElementById('share-loading').style.display = 'none';
          
          canvas.toBlob(blob => { if (!blob) return; doShare(blob); }, 'image/png');
        }).catch(e => {
          console.error('Share error:', e);
          footer.style.display = origFooterDisp;
          card.style.maxHeight = origMaxH;
          card.style.overflow = origOverflow;
          card.style.maxHeight = origMaxH;
          card.style.overflow = origOverflow;
          card.style.background = origCardBg;
          overlay.style.background = origOverlayBg;
          overlay.style.opacity = origOverlayOpacity;
          document.getElementById('share-loading').style.display = 'none';
          alert('分享失败：' + e.message);
        });
      }, 300);
    }

    document.addEventListener('keydown', (e) => {
      if (!quizOverlay.classList.contains('active')) return;
      if (e.key >= '1' && e.key <= '3') {
        const displayIdx = parseInt(e.key) - 1;
        const origIdx = state.shuffles[state.current][displayIdx];
        selectOption(origIdx);
      }
      if (e.key === 'ArrowRight' || e.key === 'Enter') nextBtn.click();
      if (e.key === 'ArrowLeft') prevBtn.click();
      if (e.key === 'Escape') hideQuiz();
    });
  
</script>

  <div class="qr-modal" id="qr-modal" onclick="this.classList.remove('active')">
    <button class="qr-modal-close" onclick="event.stopPropagation();document.getElementById('qr-modal').classList.remove('active')">×</button>
    <img src="qr-community.png" loading="lazy" alt="扫码加入黑客松社群" onclick="event.stopPropagation()">
  </div>

  <div class="share-loading" id="share-loading" style="display:none"><div class="spinner"></div></div>
  <div class="share-preview-overlay" id="share-preview-overlay">
    <div class="share-preview-img-wrap"><img class="share-preview-img" id="share-preview-img" src="" alt="Share"></div>
    <p class="share-preview-hint" id="share-preview-hint"></p>
    <div class="share-preview-actions">
      <button class="share-preview-btn primary" onclick="document.getElementById('share-preview-overlay').classList.remove('active')">关闭</button>
    </div>
  </div>

</body></html>
